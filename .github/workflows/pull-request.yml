name: PR Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: src/global.json
    - name: Build
      run: dotnet build -c Release -warnaserror repo.slnx
    - name: Test
      run: dotnet test -c Release --no-build repo.slnx
